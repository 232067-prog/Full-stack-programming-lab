<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab Task 7 - Student Data (JSON)</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f4f8; padding: 30px; }
        h1 { color: #2c3e50; text-align: center; }
        .box { background: white; border-left: 5px solid #16a085; border-radius: 8px;
               padding: 20px; margin: 15px auto; max-width: 650px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .box h3 { color: #16a085; margin: 0 0 10px 0; }
        .student { background: #e8f8f5; border-radius: 6px; padding: 12px; margin: 8px 0; }
        .student p { margin: 3px 0; color: #555; }
        .badge { display: inline-block; background: #16a085; color: white;
                 padding: 2px 10px; border-radius: 12px; font-size: 12px; margin: 2px; }
        .json-box { background: #1e1e1e; color: #00ff99; padding: 15px; border-radius: 8px;
                    font-family: monospace; font-size: 13px; white-space: pre-wrap; overflow-x: auto; }
        p { color: #555; }
    </style>
</head>
<body>

    <h1>🗂️ Student Data Using JSON</h1>
    <div id="output"></div>

    <script>
        // Step 1: Create 3 student objects
        const student1 = { name: "Ali Hassan",   age: 21, semester: "6th", courses: ["Full Stack", "DBMS", "OOP"] };
        const student2 = { name: "Sara Khan",    age: 20, semester: "4th", courses: ["Web Dev", "AI", "DSA"] };
        const student3 = { name: "Usman Malik",  age: 19, semester: "2nd", courses: ["Programming", "Calculus"] };

        const studentsArray = [student1, student2, student3];

        // Step 2: Convert to JSON string
        const jsonString = JSON.stringify(studentsArray, null, 2);

        // Step 3: Convert JSON back to object
        const parsedStudents = JSON.parse(jsonString);

        // Step 4 & 6: Destructuring + forEach loop
        let studentCards = "";
        parsedStudents.forEach(student => {
            const { name, age, semester, courses } = student; // destructuring

            const courseBadges = courses.map(c => `<span class="badge">${c}</span>`).join(" ");

            studentCards += `
                <div class="student">
                    <p><strong>Name:</strong> ${name}</p>
                    <p><strong>Age:</strong> ${age}</p>
                    <p><strong>Semester:</strong> ${semester}</p>
                    <p><strong>Courses:</strong> ${courseBadges}</p>
                </div>
            `;
        });

        // Step 5: Display all in HTML
        document.getElementById("output").innerHTML = `
            <div class="box">
                <h3>👨‍🎓 Student Details (from JSON)</h3>
                ${studentCards}
            </div>
            <div class="box">
                <h3>📄 JSON String (JSON.stringify output)</h3>
                <div class="json-box">${jsonString}</div>
            </div>
        `;
    </script>

</body>
</html>

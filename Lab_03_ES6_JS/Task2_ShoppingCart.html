<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab Task 2 - Online Shopping Cart</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f4f8; padding: 30px; }
        h1 { color: #2c3e50; text-align: center; }
        .box { background: white; border-left: 5px solid #e74c3c; border-radius: 8px;
               padding: 20px; margin: 15px auto; max-width: 600px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .box h3 { color: #e74c3c; margin: 0 0 10px 0; }
        .box p { color: #555; margin: 5px 0; }
        .badge { display: inline-block; background: #e74c3c; color: white;
                 padding: 2px 10px; border-radius: 12px; font-size: 13px; margin: 2px; }
    </style>
</head>
<body>

    <h1>🛒 Online Shopping Cart</h1>
    <div id="cartOutput"></div>

    <script>
       
        function addToCart(...items) {
            return items;
        }

      
        const products = addToCart("Laptop", "Mouse", "Keyboard", "Monitor", "Headphones");
        const clonedCart = [...products];
       
        const [firstProduct, ...remainingProducts] = clonedCart;

        
        let output = `
            <div class="box">
                <h3>🛍️ Total Items in Cart</h3>
                <p><strong>Total:</strong> ${products.length} items</p>
            </div>

            <div class="box">
                <h3>⭐ First Item</h3>
                <p>${firstProduct}</p>
            </div>

            <div class="box">
                <h3>📦 Remaining Products</h3>
                <p>${remainingProducts.map(p => `<span class="badge">${p}</span>`).join(" ")}</p>
            </div>

            <div class="box">
                <h3>🔁 Cloned Cart (Spread Operator)</h3>
                <p>${clonedCart.map(p => `<span class="badge">${p}</span>`).join(" ")}</p>
            </div>
        `;

        document.getElementById("cartOutput").innerHTML = output;
    </script>

</body>
</html>

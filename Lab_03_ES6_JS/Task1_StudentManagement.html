<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Task 1 - Student Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            padding: 30px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        .student-card {
            background: white;
            border-left: 5px solid #3498db;
            border-radius: 8px;
            padding: 20px;
            margin: 15px auto;
            max-width: 600px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .student-card h3 {
            color: #3498db;
            margin: 0 0 10px 0;
        }
        .student-card p {
            margin: 5px 0;
            color: #555;
        }
        .badge {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 13px;
            margin: 2px;
        }
    </style>
</head>
<body>

    <h1>🎓 Student Management System</h1>
    <div id="studentContainer"></div>

    <script>
        // ES6 Class
        class Student {
            constructor(id, name, semester, courses) {
                this.id = id;
                this.name = name;
                this.semester = semester;
                this.courses = courses; // array
            }

            // Method to get HTML card
            getCard() {
                const coursesBadges = this.courses
                    .map(c => `<span class="badge">${c}</span>`)
                    .join(" ");

                return `
                    <div class="student-card">
                        <h3>👤 ${this.name}</h3>
                        <p><strong>ID:</strong> ${this.id}</p>
                        <p><strong>Semester:</strong> ${this.semester}</p>
                        <p><strong>Courses:</strong> ${coursesBadges}</p>
                    </div>
                `;
            }
        }
       
        const s1 = new Student(101, "Ali Hassan", "6th", ["Full Stack", "DBMS", "OOP"]);
        const s2 = new Student(102, "Sara Khan", "4th", ["Web Dev", "AI", "Data Structures"]);
        const s3 = new Student(103, "Usman Malik", "2nd", ["Programming Fundamentals", "Calculus"]);
      
        let output = "";
        const students = [s1, s2, s3];
        students.forEach(student => {
            output += student.getCard();
        });

        document.getElementById("studentContainer").innerHTML = output;
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab Task 3 - Async Data Loader</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f4f8; padding: 30px; }
        h1 { color: #2c3e50; text-align: center; }
        .box { background: white; border-left: 5px solid #9b59b6; border-radius: 8px;
               padding: 20px; margin: 15px auto; max-width: 600px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .box h3 { color: #9b59b6; margin: 0 0 10px 0; }
        .user-card { background: #f9f0ff; border-radius: 6px; padding: 10px; margin: 8px 0; }
        .user-card p { margin: 3px 0; color: #555; }
        #status { text-align: center; font-size: 18px; color: #9b59b6; margin: 20px; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>

    <h1>⏳ Asynchronous Data Loader</h1>
    <p id="status">⏳ Loading users... please wait 3 seconds</p>
    <div id="userOutput"></div>

    <script>
        // Change this to false to simulate failure/reject
        const dataAvailable = true;

        // Promise function with setTimeout (3 sec delay)
        function fetchUsers() {
            return new Promise(function(resolve, reject) {
                setTimeout(function() {
                    if (dataAvailable) {
                        resolve([
                            { id: 1, name: "Ali Hassan",   role: "Student" },
                            { id: 2, name: "Sara Khan",    role: "Teacher" },
                            { id: 3, name: "Usman Malik",  role: "Student" },
                            { id: 4, name: "Ayesha Noor",  role: "Admin"   }
                        ]);
                    } else {
                        reject("❌ Failed to load data from server!");
                    }
                }, 3000); // 3 seconds delay
            });
        }

        // .then() and .catch()
        fetchUsers()
            .then(function(users) {
                document.getElementById("status").innerHTML = "✅ Data Loaded Successfully!";

                let cards = users.map(u => `
                    <div class="user-card">
                        <p><strong>ID:</strong> ${u.id}</p>
                        <p><strong>Name:</strong> ${u.name}</p>
                        <p><strong>Role:</strong> ${u.role}</p>
                    </div>
                `).join("");

                document.getElementById("userOutput").innerHTML = `
                    <div class="box">
                        <h3>👥 Loaded Users</h3>
                        ${cards}
                    </div>
                `;
            })
            .catch(function(error) {
                document.getElementById("status").innerHTML =
                    `<span class="error">${error}</span>`;
            });
    </script>

</body>
</html>

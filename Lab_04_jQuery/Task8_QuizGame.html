<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Task 8 — Quiz Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body{font-family:Inter,system-ui,Arial;background:#f7f9fb;margin:0;color:#111}
    .wrap{max-width:720px;margin:48px auto;padding:24px;background:#fff;border-radius:8px;box-shadow:0 6px 24px rgba(16,24,40,.06)}
    .question{font-weight:600;margin-bottom:8px}
    .choices{display:grid;gap:8px}
    .choice{padding:10px;border-radius:8px;border:1px solid #eef3fb;background:#fbfdff;cursor:pointer}
    .choice.selected{background:#e0f2fe;border-color:#7dd3fc}
    .result{padding:12px;background:#ecfdf5;border:1px solid #10b981;color:#065f46;border-radius:8px;margin-top:12px;display:none}
    .nav{display:flex;justify-content:space-between;margin-top:12px}
    .btn{background:#2563eb;color:#fff;padding:8px 12px;border-radius:6px;border:0;cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <h1 style="margin:0 0 8px">Quiz Game</h1>
    <div id="quiz">
      <div id="qnum"></div>
      <div class="question" id="question"></div>
      <div class="choices" id="choices"></div>
      <div class="nav"><button id="prev" class="btn">Previous</button><button id="next" class="btn">Next</button></div>
      <div id="result" class="result"></div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $(function(){
      const questions = [
        {q:'What is 2+2?', choices:['3','4','5','6'], a:1},
        {q:'Which is a fruit?', choices:['Carrot','Apple','Potato','Celery'], a:1},
        {q:'HTML stands for?', choices:['Hyper Text','Home Tool','High Text','Hyperlink Text'], a:0}
      ];
      let idx=0; const answers = Array(questions.length).fill(null);
      function render(){
        $('#qnum').text('Question '+(idx+1)+ ' of '+questions.length);
        $('#question').text(questions[idx].q);
        const $c=$('#choices').empty();
        questions[idx].choices.forEach((ch,i)=>{
          const $ch=$('<div class="choice">').text(ch).data('i',i);
          if(answers[idx]===i) $ch.addClass('selected');
          $c.append($ch);
        });
        $('#result').hide();
      }
      $('#choices').on('click','.choice',function(){
        $('.choice').removeClass('selected'); $(this).addClass('selected'); answers[idx]=$(this).data('i');
      });
      $('#next').on('click',function(){ if(idx<questions.length-1){ idx++; render(); } else showScore(); });
      $('#prev').on('click',function(){ if(idx>0){ idx--; render(); } });
      function showScore(){ const score = answers.reduce((s,a,i)=> s + (a===questions[i].a?1:0),0); $('#result').text('Score: '+score+'/'+questions.length).fadeIn(200); }
      render();
    });
  </script>
</body>
</html>

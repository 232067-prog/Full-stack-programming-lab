<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Task 1 — Dynamic List Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f7f9fb;--card:#fff;--accent:#2563eb;--muted:#6b7280}
    body{font-family:Inter,system-ui,Segoe UI,Arial;margin:0;background:var(--bg);color:#111}
    .wrap{max-width:760px;margin:48px auto;padding:24px;background:var(--card);box-shadow:0 6px 24px rgba(16,24,40,.06);border-radius:8px}
    h1{margin:0 0 12px;font-size:20px}
    .controls{display:flex;gap:8px;margin-bottom:16px}
    input[type=text]{flex:1;padding:10px 12px;border:1px solid #e6edf3;border-radius:6px}
    button{background:var(--accent);color:#fff;padding:10px 14px;border-radius:6px;border:0;cursor:pointer}
    ul{list-style:none;padding:0;margin:0}
    li{display:flex;justify-content:space-between;align-items:center;padding:10px;border-radius:6px;border:1px solid #eef3fb;margin-bottom:8px}
    li .label{color:var(--muted)}
    li:hover{background:#f1f8ff}
    .del{background:#ef4444;border:0;color:#fff;padding:6px 8px;border-radius:6px;cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Dynamic List Manager</h1>
    <p style="color:var(--muted);margin-top:0">Add items below; click <strong>Delete</strong> to remove. Hover highlights.</p>
    <div class="controls">
      <input id="itemInput" type="text" placeholder="Enter item text" />
      <button id="addBtn">Add</button>
    </div>
    <ul id="list"></ul>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $(function(){
      function addItem(text){
        if(!text) return;
        const $li = $("<li>")
          .append($('<span class="label">').text(text))
          .append($('<button class="del">').text('Delete'));
        $('#list').prepend($li.hide().slideDown(200));
      }

      $('#addBtn').on('click',function(){
        addItem($('#itemInput').val().trim());
        $('#itemInput').val('').focus();
      });

      $('#itemInput').on('keypress',function(e){ if(e.key==='Enter') $('#addBtn').click(); });

      $('#list').on('click','.del',function(){
        $(this).closest('li').slideUp(200,function(){ $(this).remove(); });
      });
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Task 5 — Chained Style Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body{font-family:Inter,system-ui,Arial;background:#f7f9fb;margin:0;color:#111}
    .wrap{max-width:820px;margin:48px auto;padding:20px;background:#fff;border-radius:8px;box-shadow:0 6px 24px rgba(16,24,40,.06)}
    .controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
    .controls button{padding:8px 10px;border-radius:6px;border:1px solid #e6edf3;background:#fff;cursor:pointer}
    .editor{padding:18px;border-radius:8px;border:1px solid #eef3fb;background:#fbfdff}
  </style>
</head>
<body>
  <div class="wrap">
    <h1 style="margin:0 0 8px">Chained Style Editor</h1>
    <div class="controls">
      <button data-action="size" data-val="16">Small</button>
      <button data-action="size" data-val="20">Medium</button>
      <button data-action="size" data-val="24">Large</button>
      <button data-action="color" data-val="#111827">Text Color</button>
      <button data-action="color" data-val="#2563eb">Accent Color</button>
      <button data-action="bg" data-val="#fff7ed">Bg Light</button>
      <button data-action="bold">Bold</button>
      <button data-action="italic">Italic</button>
      <button id="reset">Reset</button>
    </div>
    <div class="editor" id="editor">This is a sample paragraph. Use the controls above to change font size, color, background, and toggle bold/italic using chaining.</div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $(function(){
      $('#reset').on('click',function(){ $('#editor').attr('style',''); });
      $('.controls button[data-action]').on('click',function(){
        const $e = $('#editor');
        const a = $(this).data('action');
        if(a==='size') $e.css('font-size',$(this).data('val')+'px');
        if(a==='color') $e.css('color',$(this).data('val'));
        if(a==='bg') $e.css('background',$(this).data('val'));
        if(a==='bold') $e.css('font-weight', function(i,v){return v==='700' ? '400' : '700'} );
        if(a==='italic') $e.css('font-style', function(i,v){return v==='italic' ? 'normal' : 'italic'} );
      });
    });
  </script>
</body>
</html>

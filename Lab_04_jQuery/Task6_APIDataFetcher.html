<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Task 6 — API Data Fetcher</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body{font-family:Inter,system-ui,Arial;background:#f7f9fb;margin:0;color:#111}
    .wrap{max-width:900px;margin:40px auto;padding:20px;background:#fff;border-radius:8px;box-shadow:0 6px 24px rgba(16,24,40,.06)}
    .posts{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
    .post{padding:12px;border-radius:8px;border:1px solid #eef3fb;background:#fbfdff}
    .load{display:block;margin:14px auto;padding:10px 14px;border-radius:6px;border:0;background:#2563eb;color:#fff;cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <h1 style="margin:0 0 12px">API Data Fetcher</h1>
    <div id="posts" class="posts"></div>
    <button id="loadMore" class="load">Load More</button>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $(function(){
      const $posts = $('#posts'); let page=1; const per=6;
      function render(items){ items.forEach(it=>{ $posts.append($('<div class="post">').html('<h3>'+it.title+'</h3><p>'+it.body+'</p>')); }); }
      function load(){ $('#loadMore').prop('disabled',true).text('Loading...');
        $.get('https://jsonplaceholder.typicode.com/posts?_page='+page+'&_limit='+per)
          .done(data=>{ if(data.length){ render(data); page++; $('#loadMore').prop('disabled',false).text('Load More'); } else { $('#loadMore').text('No more items').prop('disabled',true); } })
          .fail(()=>{ $('#loadMore').text('Error').prop('disabled',false); });
      }
      $('#loadMore').on('click',load);
      load();
    });
  </script>
</body>
</html>

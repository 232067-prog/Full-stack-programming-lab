<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Task 3 — Interactive Form Validation</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body{font-family:Inter,system-ui,Arial;background:#f7f9fb;margin:0;color:#111}
    .wrap{max-width:640px;margin:48px auto;padding:24px;background:#fff;border-radius:8px;box-shadow:0 6px 24px rgba(16,24,40,.06)}
    label{display:block;margin-top:12px;font-weight:600}
    input,textarea{width:100%;padding:10px;border:1px solid #e6edf3;border-radius:6px}
    .error{border-color:#ef4444;background:#fff1f0}
    .errTxt{color:#ef4444;font-size:13px;margin-top:6px}
    .success{background:#ecfdf5;border:1px solid #10b981;padding:12px;border-radius:6px;color:#065f46;margin-top:12px}
    button{margin-top:12px;padding:10px 14px;border-radius:6px;border:0;background:#2563eb;color:#fff;cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <h1 style="margin:0 0 8px">Interactive Form Validation</h1>
    <form id="frm" novalidate>
      <label for="name">Name</label>
      <input id="name" name="name" />
      <div class="errTxt" data-for="name" style="display:none"></div>

      <label for="email">Email</label>
      <input id="email" name="email" />
      <div class="errTxt" data-for="email" style="display:none"></div>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="4"></textarea>
      <div class="errTxt" data-for="message" style="display:none"></div>

      <button type="submit">Send</button>
    </form>
    <div id="success" class="success" style="display:none">Your message was sent successfully.</div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $(function(){
      function showError(field,msg){
        const $f=$(field); $f.addClass('error'); $(`.errTxt[data-for="${$f.attr('id')}"]`).text(msg).show();
      }
      function clearError(field){ const $f=$(field); $f.removeClass('error'); $(`.errTxt[data-for="${$f.attr('id')}"]`).hide(); }

      $('#frm input, #frm textarea').on('blur',function(){
        const id=this.id, val=$(this).val().trim();
        clearError(this);
        if(!val){ showError(this,'This field is required'); return; }
        if(id==='email' && !/^\S+@\S+\.\S+$/.test(val)) showError(this,'Enter a valid email');
      });

      $('#frm').on('submit',function(e){
        e.preventDefault();
        let ok=true; $('#success').hide();
        $('#frm input, #frm textarea').each(function(){ if(!$(this).val().trim()){ showError(this,'This field is required'); ok=false; } });
        if(!ok) return;
        // show success message (no refresh)
        $('#success').fadeIn(200).text('Your message was sent successfully.');
        $('#frm')[0].reset();
      });
    });
  </script>
</body>
</html>
